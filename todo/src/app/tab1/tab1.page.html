<ion-header>
  <ion-toolbar color='tertiary'>
    <ion-title>
      Home
    </ion-title>
    <ion-button slot="end" color="primary" (click)="getFirebaseData()">
      <ion-icon slot="icon-only" name="refresh"></ion-icon>
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content>

    <ion-item>
        <ion-icon name="checkmark-circle" slot="start"></ion-icon>
       <h4><b>Mes priorités</b></h4>
       <ion-button (click)="addPriority()" slot="end" size="large" fill="clear">
          <ion-icon slot="icon-only" name="add-circle"></ion-icon>
        </ion-button>
      </ion-item>
      
      <ion-list *ngFor="let priority of priorities; let idx = index">
        
          <ion-item-sliding>
           
              <ion-item>
                <ion-label>{{idx + 1}} - {{priority.text}}</ion-label>
              </ion-item>
          
              <ion-item-options side="end">
                <ion-item-option (click)="delete(priority)" >Supprimer</ion-item-option>
              </ion-item-options>
            </ion-item-sliding>       
                       
        </ion-list>

        <ion-item>
            <ion-icon name="flame" slot="start"></ion-icon>
           <h4><b>Mes buts</b></h4>
           <ion-button  (click)="addGoal()" slot="end" size="large" fill="clear">
              <ion-icon slot="icon-only" name="add-circle"></ion-icon>
            </ion-button>
          </ion-item>
          
          <ion-list *ngFor="let goal of goals; let idx = index">
              <ion-item-sliding>
               
                  <ion-item>
                    <ion-label>{{idx + 1}} - {{ goal.text }}</ion-label>
                  </ion-item>
              
                  <ion-item-options side="end">
                    <ion-item-option (click)="delete(goal)">Supprimer</ion-item-option>
                  </ion-item-options>
                </ion-item-sliding>       
                           
            </ion-list>

            <ion-item>
                <ion-icon name="quote" slot="start"></ion-icon>
               <h4><b>Mes citations du jour</b></h4>
               <ion-button  (click)="addQuote()" slot="end" size="large" fill="clear">
                  <ion-icon slot="icon-only" name="add-circle"></ion-icon>
                </ion-button>
              </ion-item>
              
              <ion-list *ngFor="let quote of quotes; let idx = index">
                  <ion-item-sliding>
                   
                      <ion-item>
                        <ion-label text-wrap >{{ quote.text }}</ion-label>
                      </ion-item>
                  
                      <ion-item-options side="end">
                        <ion-item-option (click)="delete(quote)">Supprimer</ion-item-option>
                      </ion-item-options>
                    </ion-item-sliding>       
                    
                </ion-list>
        

</ion-content>
